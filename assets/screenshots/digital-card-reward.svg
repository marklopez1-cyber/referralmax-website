<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E5BA8"/>
      <stop offset="1" stop-color="#0E2A47"/>
    </linearGradient>
    <filter id="s4" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0E2A47" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0E2A47" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="600" height="360" fill="#F7F9FC"/>

  <!-- Email preview frame -->
  <g filter="url(#s4)">
    <rect x="30" y="30" width="540" height="300" rx="14" fill="#FFF"/>
    <rect x="30" y="30" width="540" height="42" rx="14" fill="#0E2A47"/>
    <rect x="30" y="58" width="540" height="14" fill="#0E2A47"/>
    <text x="50" y="56" fill="#FFF" font-size="13" font-weight="700">Instant Heating and Air</text>

    <text x="50" y="100" fill="#0E2A47" font-size="14" font-weight="700">Your Reward Has Been Sent! 🎉</text>
    <text x="50" y="122" fill="#4A5568" font-size="11">Hi Sarah,</text>
    <text x="50" y="140" fill="#4A5568" font-size="11">Great news — your referral reward is on its way!</text>

    <!-- Gift card -->
    <g filter="url(#cardShadow)">
      <rect x="140" y="162" width="320" height="130" rx="14" fill="url(#cardGrad)"/>
      <!-- Visa style chip -->
      <rect x="160" y="190" width="34" height="24" rx="3" fill="#F4C430"/>
      <rect x="164" y="194" width="26" height="16" fill="none" stroke="#0E2A47" stroke-width="0.5" opacity="0.4"/>
      <line x1="164" y1="200" x2="190" y2="200" stroke="#0E2A47" stroke-width="0.4" opacity="0.4"/>
      <line x1="164" y1="205" x2="190" y2="205" stroke="#0E2A47" stroke-width="0.4" opacity="0.4"/>
      <text x="160" y="244" fill="#FFF" font-size="16" font-weight="600" letter-spacing="3">5291  ••••  ••••  0847</text>
      <text x="160" y="268" fill="#FFF" font-size="9" opacity="0.7" letter-spacing="0.8">VIRTUAL VISA REWARD</text>
      <text x="160" y="282" fill="#FFF" font-size="9" opacity="0.7">SARAH JOHNSON</text>
      <text x="440" y="282" fill="#FFF" font-size="12" font-weight="700" text-anchor="end">$400.00</text>
      <!-- VISA brand block -->
      <text x="436" y="194" fill="#FFF" font-size="18" font-weight="900" font-style="italic" text-anchor="end" letter-spacing="1">VISA</text>
    </g>

    <text x="50" y="314" fill="#4A5568" font-size="11">Check your inbox for details — delivered instantly by Tremendous.</text>
  </g>
</svg>
