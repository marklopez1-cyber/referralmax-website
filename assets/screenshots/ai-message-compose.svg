<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="s5" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0E2A47" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="aiBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B35"/>
      <stop offset="1" stop-color="#F58220"/>
    </linearGradient>
  </defs>
  <rect width="600" height="420" fill="#F7F9FC"/>
  <g filter="url(#s5)">
    <rect x="30" y="20" width="540" height="380" rx="12" fill="#FFF"/>
    <text x="50" y="50" fill="#0E2A47" font-size="15" font-weight="700">Compose your message</text>
    <text x="540" y="50" fill="#9ca3af" font-size="16" text-anchor="end">×</text>
    <line x1="50" y1="62" x2="550" y2="62" stroke="#F1F5F9"/>

    <!-- Tone bar -->
    <rect x="50" y="74" width="500" height="32" rx="6" fill="#FFF7ED"/>
    <text x="62" y="94" fill="#4A5568" font-size="10" font-weight="600">Tone:</text>
    <rect x="96" y="80" width="64" height="20" rx="10" fill="#0E2A47"/>
    <text x="128" y="94" fill="#FFF" font-size="10" font-weight="600" text-anchor="middle">Friendly</text>
    <rect x="166" y="80" width="82" height="20" rx="10" fill="#FFF" stroke="#CBD5E0"/>
    <text x="207" y="94" fill="#4A5568" font-size="10" text-anchor="middle">Professional</text>
    <rect x="254" y="80" width="58" height="20" rx="10" fill="#FFF" stroke="#CBD5E0"/>
    <text x="283" y="94" fill="#4A5568" font-size="10" text-anchor="middle">Casual</text>
    <rect x="318" y="80" width="56" height="20" rx="10" fill="#FFF" stroke="#CBD5E0"/>
    <text x="346" y="94" fill="#4A5568" font-size="10" text-anchor="middle">Urgent</text>

    <!-- SMS field -->
    <text x="50" y="136" fill="#374151" font-size="11" font-weight="600">SMS Message *</text>
    <text x="410" y="136" fill="#9ca3af" font-size="10">142 / 160</text>
    <rect x="462" y="122" width="88" height="22" rx="5" fill="url(#aiBtn)"/>
    <text x="506" y="137" fill="#FFF" font-size="10" font-weight="700" text-anchor="middle">✨ Generate with AI</text>

    <rect x="50" y="146" width="500" height="58" rx="7" fill="#FFF" stroke="#CBD5E0"/>
    <text x="64" y="166" fill="#1f2937" font-size="10.5">Hey! I work with Instant Heating and Air and they've got $250 off</text>
    <text x="64" y="180" fill="#1f2937" font-size="10.5">AC installs + 10% off tune-ups. My code SARJOH742 unlocks it →</text>
    <text x="64" y="194" fill="#1f2937" font-size="10.5">https://ihair.appdepot.net/r/sarjoh742</text>

    <!-- Email subject -->
    <text x="50" y="228" fill="#374151" font-size="11" font-weight="600">Email Subject *</text>
    <rect x="462" y="214" width="88" height="22" rx="5" fill="url(#aiBtn)"/>
    <text x="506" y="229" fill="#FFF" font-size="10" font-weight="700" text-anchor="middle">✨ Generate with AI</text>
    <rect x="50" y="238" width="500" height="28" rx="7" fill="#FFF" stroke="#CBD5E0"/>
    <text x="64" y="256" fill="#1f2937" font-size="10.5">Thought you'd want this — $250 off your next AC install</text>

    <!-- Email body -->
    <text x="50" y="290" fill="#374151" font-size="11" font-weight="600">Email Body *</text>
    <rect x="462" y="276" width="88" height="22" rx="5" fill="url(#aiBtn)"/>
    <text x="506" y="291" fill="#FFF" font-size="10" font-weight="700" text-anchor="middle">✨ Generate with AI</text>
    <rect x="50" y="300" width="500" height="74" rx="7" fill="#FFF" stroke="#CBD5E0"/>
    <text x="64" y="318" fill="#1f2937" font-size="10.5">Hi <tspan fill="#1E5BA8" font-weight="700">{first_name}</tspan>,</text>
    <text x="64" y="336" fill="#1f2937" font-size="10.5">Hope you're doing well! I've been working with Instant Heating and</text>
    <text x="64" y="350" fill="#1f2937" font-size="10.5">Air for a while and they've got a great deal going right now —</text>
    <text x="64" y="364" fill="#1f2937" font-size="10.5">$250 off AC installation plus 10% off tune-ups...</text>
  </g>
</svg>
