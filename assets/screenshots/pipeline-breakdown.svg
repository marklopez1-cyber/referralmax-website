<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="s3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0E2A47" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="600" height="320" fill="#F7F9FC"/>
