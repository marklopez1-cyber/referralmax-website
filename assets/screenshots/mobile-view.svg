<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="s6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0E2A47" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="codeBg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8EEF7"/>
