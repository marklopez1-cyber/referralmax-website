      <rect x="263" y="288" width="7" height="7"/>
      <rect x="234" y="317" width="7" height="7"/>
      <rect x="244" y="294" width="3" height="3"/>
      <rect x="251" y="298" width="4" height="3"/>
      <rect x="259" y="294" width="4" height="4"/>
      <rect x="244" y="304" width="2" height="2"/>
      <rect x="249" y="304" width="6" height="3"/>
      <rect x="258" y="307" width="3" height="3"/>
      <rect x="244" y="313" width="4" height="2"/>
      <rect x="250" y="312" width="2" height="5"/>
      <rect x="257" y="315" width="4" height="3"/>
